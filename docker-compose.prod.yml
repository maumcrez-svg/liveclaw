version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: liveclaw
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-liveclaw_secret}
      POSTGRES_DB: liveclaw
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    restart: unless-stopped

  mediamtx:
    image: bluenviron/mediamtx:latest
    ports:
      - "1935:1935"
      - "8888:8888"
    volumes:
      - ./infra/mediamtx/mediamtx.yml:/mediamtx.yml
    environment:
      - MTX_PROTOCOLS=tcp
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: liveclaw
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-liveclaw_secret}
      DATABASE_NAME: liveclaw
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MEDIAMTX_API_URL: http://mediamtx:9997
      MEDIAMTX_RTMP_URL: rtmp://mediamtx:1935
      MEDIAMTX_HLS_URL: http://mediamtx:8888
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      MEDIAMTX_WEBHOOK_SECRET: ${MEDIAMTX_WEBHOOK_SECRET:?MEDIAMTX_WEBHOOK_SECRET must be set}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      API_PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis
      - mediamtx
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:3001}
        NEXT_PUBLIC_HLS_URL: ${NEXT_PUBLIC_HLS_URL:-http://localhost:8888}
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
