<script>
// =============================================
// Audio System
// =============================================
let audioCtx = null;
let analyser = null;
let currentAmplitude = 0;
let isSpeaking = false;

function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  analyser.connect(audioCtx.destination);
}

window.__playAudio = function(base64, format) {
  return new Promise(async (resolve) => {
    try {
      if (!audioCtx) initAudio();
      if (audioCtx.state === 'suspended') await audioCtx.resume();
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      const buffer = await audioCtx.decodeAudioData(bytes.buffer);
      const source = audioCtx.createBufferSource();
      source.buffer = buffer;
      source.connect(analyser);
      isSpeaking = true;
      hostState = 'speaking';
      const dataArray = new Uint8Array(analyser.frequencyBinCount);
      const ampInterval = setInterval(() => {
        analyser.getByteFrequencyData(dataArray);
        let sum = 0;
        for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
        currentAmplitude = sum / dataArray.length / 255;
      }, 50);
      source.onended = () => {
        isSpeaking = false; currentAmplitude = 0;
        hostState = 'idle';
        clearInterval(ampInterval); resolve();
      };
      source.start(0);
      setTimeout(() => {
        if (isSpeaking) { isSpeaking = false; currentAmplitude = 0; hostState = 'idle'; clearInterval(ampInterval); resolve(); }
      }, (buffer.duration + 2) * 1000);
    } catch (err) {
      console.error('Audio error:', err);
      isSpeaking = false; hostState = 'idle'; resolve();
    }
  });
};

// =============================================
// Scene Canvas (background + left rail + host)
// =============================================
const canvas = document.getElementById('scene-canvas');
const ctx = canvas.getContext('2d');

// =============================================
// GLOBAL STATE
// =============================================
let time = 0;

// Host: 3 states only
let hostState = 'idle'; // idle | speaking | reacting
let reactTimer = 0;

// Animation
let blinkTimer = 0;
let isBlinking = false;
let breathOffset = 0;
let browRaise = 0;
let browRaiseTarget = 0;
let mouthFrame = 0;
let mouthTimer = 0;

// Movement system
let headTilt = 0;        // head rotation in radians
let headTiltTarget = 0;
let torsoLean = 0;       // torso x offset
let torsoLeanTarget = 0;
let gestureArm = 0;      // 0=rest, 1=left raised, 2=right raised, 3=both
let gestureArmTarget = 0;
let gestureArmSmooth = 0;
let weightShift = 0;     // lateral weight shift
let weightShiftTarget = 0;
let shoulderRaise = 0;   // shoulder emphasis
let shoulderRaiseTarget = 0;
let gestureTimer = 0;    // time between gesture changes
let idleShiftTimer = 0;  // idle weight shift timer

// Ecosystem data for left rail
let ecosystemData = { baseTvl: '--', ethPrice: '--', gas: '--', blockNumber: '--', dailyTxn: '--', mood: 'Neutral' };
let ecosystemFlash = { baseTvl: 0, ethPrice: 0, gas: 0, blockNumber: 0, dailyTxn: 0 };

// Current segment type for top bar
let currentSegmentType = 'monitoring';

// =============================================
// VESPOLAK — PNG head + pixel art body
// =============================================
const PX = 8;
const HEAD_IMG = new Image();
let headLoaded = false;
HEAD_IMG.onload = () => { headLoaded = true; console.log('[Broadcast] Head image loaded'); };
HEAD_IMG.onerror = (e) => { console.error('[Broadcast] Head image FAILED to load', e); };
HEAD_IMG.src = '/assets/vespolak-head.png';
// Fallback: check every 500ms if loaded
const headCheck = setInterval(() => {
  if (HEAD_IMG.complete && HEAD_IMG.naturalWidth > 0) {
    headLoaded = true;
    clearInterval(headCheck);
    console.log('[Broadcast] Head image loaded (fallback check)');
  }
}, 500);

// Head image size on screen
const HEAD_W = 210;
const HEAD_H = 210;

// Body pixel art colors
const COLORS = {
  skin:   '#8B5E3C',
  skin2:  '#7A5030',
  shirt:  '#1a1a2e',
  shirt2: '#12122a',
  blue:   '#0052FF',
  blue2:  '#003ecc',
  pants:  '#1c1c2e',
  pants2: '#141426',
  belt:   '#2a2020',
  shoe:   '#111118',
  shoeS:  '#0044dd',
};

// Body-only pixels (no head — starts at neck/shoulders)
// Origin (0,0) = top-left of body grid
// Body is ~27 cols wide, ~30 rows tall
function buildBodyPixels() {
  const pixels = [];
  function row(r, segments) {
    for (const [c0, c1, col] of segments) {
      for (let c = c0; c <= c1; c++) pixels.push([c, r, col]);
    }
  }

  // NECK — rows 0-1
  row(0, [[13,19,'skin']]);
  row(1, [[13,19,'skin']]);

  // SHOULDERS / SHIRT — rows 2-11 (narrowed: cols 8-24 instead of 5-27)
  row(2,  [[10,12,'shirt'],[13,14,'skin'],[15,17,'shirt'],[18,19,'skin'],[20,22,'shirt']]);
  row(3,  [[9,12,'shirt'],[13,14,'shirt2'],[15,18,'shirt'],[19,20,'shirt2'],[21,23,'shirt']]);
  row(4,  [[8,11,'shirt'],[12,20,'shirt'],[21,24,'shirt']]);
  row(5,  [[8,24,'shirt']]);
  row(6,  [[8,24,'shirt']]);
  // Blue collar accent
  row(2,  [[15,16,'blue'],[17,18,'blue']]);
  // Blue patches
  row(6,  [[10,13,'blue'],[19,22,'blue2']]);
  row(7,  [[8,24,'shirt']]);
  row(8,  [[8,24,'shirt2']]);
  row(9,  [[8,24,'shirt']]);
  row(10, [[8,24,'shirt']]);
  row(11, [[8,24,'shirt2']]);

  // ARMS — at rest, rows 3-14 (narrowed: cols 6-7 / 25-26)
  row(3,  [[6,7,'skin'],[25,26,'skin']]);
  row(4,  [[6,7,'skin'],[25,26,'skin']]);
  row(5,  [[6,7,'skin'],[25,26,'skin']]);
  row(6,  [[6,7,'skin'],[25,26,'skin']]);
  row(7,  [[6,7,'skin'],[25,26,'skin']]);
  row(8,  [[6,7,'skin'],[25,26,'skin']]);
  row(9,  [[6,7,'skin'],[25,26,'skin']]);
  row(10, [[7,7,'skin'],[25,25,'skin']]);
  row(11, [[7,7,'skin'],[25,25,'skin']]);
  // Hands
  row(12, [[6,8,'skin'],[24,26,'skin']]);
  row(13, [[6,8,'skin'],[24,26,'skin']]);
  row(14, [[6,7,'skin'],[25,26,'skin']]);

  // BELT — rows 12-13
  row(12, [[8,24,'belt']]);
  row(13, [[8,24,'belt']]);
  row(12, [[14,18,'skin2']]);
  row(13, [[14,18,'skin2']]);

  // PANTS — rows 14-26 (narrowed: cols 9-23)
  for (let r = 14; r <= 22; r++) row(r, [[9,23,'pants']]);
  for (let r = 14; r <= 22; r++) row(r, [[15,16,'pants2']]);
  row(23, [[9,14,'pants'],[17,23,'pants']]);
  row(24, [[9,14,'pants'],[17,23,'pants']]);
  row(25, [[9,14,'pants'],[17,23,'pants']]);
  row(26, [[9,14,'pants'],[17,23,'pants']]);

  // SHOES — rows 27-31 (narrowed)
  row(27, [[8,14,'shoe'],[17,23,'shoe']]);
  row(28, [[7,15,'shoe'],[16,24,'shoe']]);
  row(29, [[7,15,'shoe'],[16,24,'shoe']]);
  row(30, [[7,15,'shoeS'],[16,24,'shoeS']]);
  row(31, [[8,14,'shoeS'],[17,23,'shoeS']]);

  return pixels;
}

const BODY_PIXELS = buildBodyPixels();
const BODY_W = 32;  // cols
const BODY_H = 32;  // rows

function drawVespolak(cx, bottomY) {
  const breath = Math.sin(time * 1.3) * 1.5;
  const baseSway = Math.sin(time * 0.4) * 2;
  const totalSway = baseSway + weightShift + torsoLean;

  // Body origin — body sits below head
  const bodyTopY = bottomY - BODY_H * PX;
  const bodyOx = cx - (BODY_W / 2) * PX + totalSway;
  const bodyOy = bodyTopY + breath - shoulderRaise;

  ctx.save();

  // Draw body pixels with per-pixel arm gesture offsets
  for (const [col, row, colorKey] of BODY_PIXELS) {
    let pixX = bodyOx + col * PX;
    let pixY = bodyOy + row * PX;

    // Arm gesture animation — offset arm pixels
    const isLeftArm = col <= 8 && row >= 3 && row <= 14;
    const isRightArm = col >= 24 && row >= 3 && row <= 14;

    if (isLeftArm) {
      // gestureArmSmooth: 1=left up, 3=both up
      const leftRaise = (gestureArmTarget === 1 || gestureArmTarget === 3) ? gestureArmSmooth : gestureArmSmooth * 0.2;
      const raiseAmount = Math.min(leftRaise, 1.0);
      const armPivotRow = 3;
      const dist = row - armPivotRow;
      // Raise: move up and outward
      pixY -= dist * raiseAmount * 2.5;
      pixX -= raiseAmount * 6;
      // Slight rotation feel
      pixY -= raiseAmount * 4;
    }

    if (isRightArm) {
      const rightRaise = (gestureArmTarget === 2 || gestureArmTarget === 3) ? gestureArmSmooth : gestureArmSmooth * 0.2;
      const raiseAmount = Math.min(rightRaise, 1.0);
      const armPivotRow = 3;
      const dist = row - armPivotRow;
      pixY -= dist * raiseAmount * 2.5;
      pixX += raiseAmount * 6;
      pixY -= raiseAmount * 4;
    }

    // Shoulder raise on emphasis rows
    if (row >= 2 && row <= 4) {
      pixY -= shoulderRaise * 0.5;
    }

    ctx.fillStyle = COLORS[colorKey] || '#ff00ff';
    ctx.fillRect(Math.round(pixX), Math.round(pixY), PX, PX);
  }

  // Draw head image above body — with tilt and nod
  if (headLoaded) {
    const headX = cx - HEAD_W / 2 + totalSway;
    const headY = bodyOy - HEAD_H + 16 - shoulderRaise * 0.5;
    // Nod when speaking + lean forward on react
    const nod = hostState === 'speaking' ? Math.sin(time * 2.5) * 2.5 :
                hostState === 'reacting' ? -4 : 0;

    // Apply head tilt rotation
    ctx.save();
    const headCx = headX + HEAD_W / 2;
    const headCy = headY + HEAD_H / 2 + nod;
    ctx.translate(headCx, headCy);
    ctx.rotate(headTilt);
    ctx.drawImage(HEAD_IMG, Math.round(-HEAD_W / 2), Math.round(-HEAD_H / 2), HEAD_W, HEAD_H);

    // Lip sync overlay — draw mouth shapes based on mouthFrame
    if (mouthFrame > 0) {
      const mouthLocalX = 0; // center of head
      const mouthLocalY = HEAD_H * 0.28; // ~78% down from top (mouth area)
      if (mouthFrame === 1) {
        ctx.fillStyle = '#3a2218';
        ctx.beginPath();
        ctx.ellipse(mouthLocalX, mouthLocalY, 10, 4, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#6B422E';
        ctx.beginPath();
        ctx.ellipse(mouthLocalX, mouthLocalY - 3, 12, 2, 0, 0, Math.PI * 2);
        ctx.fill();
      } else if (mouthFrame === 2) {
        ctx.fillStyle = '#2a1610';
        ctx.beginPath();
        ctx.ellipse(mouthLocalX, mouthLocalY, 13, 7, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#6B422E';
        ctx.beginPath();
        ctx.ellipse(mouthLocalX, mouthLocalY - 5, 14, 2.5, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#7A5030';
        ctx.beginPath();
        ctx.ellipse(mouthLocalX, mouthLocalY + 5, 11, 2, 0, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.restore();
  }

  ctx.restore();

  // Ambient glow — intensifies when speaking
  const glowIntensity = hostState === 'speaking' ? 0.08 + currentAmplitude * 0.06 : 0.04;
  const glowGrad = ctx.createRadialGradient(cx + totalSway, bottomY - 10, 10, cx + totalSway, bottomY - 10, 200);
  glowGrad.addColorStop(0, `rgba(0,82,255,${glowIntensity})`);
  glowGrad.addColorStop(1, 'rgba(0,82,255,0)');
  ctx.fillStyle = glowGrad;
  ctx.beginPath();
  ctx.ellipse(cx + totalSway, bottomY - 10, 200, 60, 0, 0, Math.PI * 2);
  ctx.fill();
}

// =============================================
// HOST STATE UPDATES
// =============================================
function updateHost() {
  const dt = 0.016;

  // Blink
  blinkTimer += dt;
  if (!isBlinking && blinkTimer > 3 + Math.random() * 4) {
    isBlinking = true;
    blinkTimer = 0;
    setTimeout(() => { isBlinking = false; }, 120);
  }

  // Mouth animation when speaking
  if (hostState === 'speaking') {
    mouthTimer += dt;
    if (mouthTimer > 0.08) {
      mouthTimer = 0;
      if (currentAmplitude > 0.15) mouthFrame = 2;
      else if (currentAmplitude > 0.05) mouthFrame = 1;
      else mouthFrame = 0;
    }
  } else {
    mouthFrame = 0;
  }

  // Reacting state — eyebrow raise for 0.5s then return
  if (hostState === 'reacting') {
    reactTimer -= dt;
    browRaiseTarget = 1;
    if (reactTimer <= 0) {
      hostState = 'idle';
      browRaiseTarget = 0;
    }
  } else {
    browRaiseTarget = 0;
  }
  browRaise += (browRaiseTarget - browRaise) * 0.15;

  // === MOVEMENT BY STATE ===
  gestureTimer += dt;

  if (hostState === 'speaking') {
    // Head tilts rhythmically with speech
    headTiltTarget = Math.sin(time * 1.8) * 0.04 + (currentAmplitude > 0.12 ? Math.sin(time * 3.5) * 0.025 : 0);

    // Torso leans into speech, shifts with emphasis
    torsoLeanTarget = Math.sin(time * 0.7) * 4 + (currentAmplitude > 0.15 ? 3 : 0);

    // Arm gestures — change every 1.5-3s during speech
    if (gestureTimer > 1.5 + Math.random() * 1.5) {
      gestureTimer = 0;
      const r = Math.random();
      if (currentAmplitude > 0.12) {
        // Animated gesturing
        gestureArmTarget = r < 0.3 ? 1 : r < 0.6 ? 2 : r < 0.8 ? 3 : 0;
      } else {
        // Quieter — mostly rest with occasional gesture
        gestureArmTarget = r < 0.7 ? 0 : r < 0.85 ? 1 : 2;
      }
    }

    // Shoulder raise on emphasis
    shoulderRaiseTarget = currentAmplitude > 0.18 ? 3 : currentAmplitude > 0.1 ? 1.5 : 0;

    // Weight shift with speech rhythm
    weightShiftTarget = Math.sin(time * 0.9) * 5;

  } else if (hostState === 'reacting') {
    // Quick lean forward + head tilt
    headTiltTarget = -0.06;
    torsoLeanTarget = 6;
    shoulderRaiseTarget = 4;
    gestureArmTarget = 3; // both arms up
    weightShiftTarget = 0;

  } else {
    // IDLE — subtle alive movement
    idleShiftTimer += dt;

    // Slow weight shift every ~4s
    if (idleShiftTimer > 4 + Math.random() * 3) {
      idleShiftTimer = 0;
      weightShiftTarget = (Math.random() - 0.5) * 8;
      // Occasional subtle head tilt change
      headTiltTarget = (Math.random() - 0.5) * 0.035;
    }

    // Very slow idle sway
    torsoLeanTarget = Math.sin(time * 0.3) * 2;
    shoulderRaiseTarget = 0;

    // Occasional arm shift at rest
    if (gestureTimer > 5 + Math.random() * 4) {
      gestureTimer = 0;
      gestureArmTarget = Math.random() < 0.85 ? 0 : (Math.random() < 0.5 ? 1 : 2);
    }
  }

  // Smooth interpolation
  const lerpSpeed = hostState === 'reacting' ? 0.18 : 0.06;
  headTilt += (headTiltTarget - headTilt) * lerpSpeed;
  torsoLean += (torsoLeanTarget - torsoLean) * lerpSpeed;
  gestureArmSmooth += (gestureArmTarget - gestureArmSmooth) * 0.08;
  weightShift += (weightShiftTarget - weightShift) * 0.04;
  shoulderRaise += (shoulderRaiseTarget - shoulderRaise) * 0.12;
}

// =============================================
// LEFT DATA RAIL (Zone A) — drawn on canvas
// =============================================
function drawLeftRail() {
  const railX = 0;
  const railY = 65;
  const railW = 346;
  const railH = 691;

  // Subtle background
  ctx.fillStyle = 'rgba(6,8,16,0.6)';
  ctx.fillRect(railX, railY, railW, railH);

  // Right border
  ctx.strokeStyle = 'rgba(0,82,255,0.08)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(railX + railW, railY);
  ctx.lineTo(railX + railW, railY + railH);
  ctx.stroke();

  // Section header
  ctx.fillStyle = 'rgba(0,82,255,0.4)';
  ctx.font = '800 9px Inter';
  ctx.letterSpacing = '2px';
  ctx.fillText('ECOSYSTEM', railX + 24, railY + 32);
  ctx.letterSpacing = '0px';

  // Metrics
  const metrics = [
    { label: 'TVL', value: ecosystemData.baseTvl, key: 'baseTvl' },
    { label: 'ETH', value: ecosystemData.ethPrice, key: 'ethPrice' },
    { label: 'GAS', value: ecosystemData.gas, key: 'gas' },
    { label: 'BLOCK', value: ecosystemData.blockNumber, key: 'blockNumber' },
    { label: 'DAILY TXN', value: ecosystemData.dailyTxn, key: 'dailyTxn' },
    { label: 'MOOD', value: ecosystemData.mood || 'Neutral', key: 'mood' },
  ];

  let my = railY + 56;
  for (const m of metrics) {
    const flash = ecosystemFlash[m.key] || 0;
    if (flash > 0) ecosystemFlash[m.key] = Math.max(0, flash - 0.02);

    // Label
    ctx.fillStyle = `rgba(0,82,255,${0.35 + flash * 0.4})`;
    ctx.font = '700 9px Inter';
    ctx.letterSpacing = '1px';
    ctx.fillText(m.label, railX + 24, my);
    ctx.letterSpacing = '0px';

    // Value
    ctx.fillStyle = `rgba(200,215,240,${0.7 + flash * 0.3})`;
    ctx.font = '600 18px JetBrains Mono';
    ctx.fillText(m.value || '--', railX + 24, my + 22);

    // Subtle separator
    ctx.strokeStyle = 'rgba(0,82,255,0.05)';
    ctx.beginPath();
    ctx.moveTo(railX + 24, my + 36);
    ctx.lineTo(railX + railW - 24, my + 36);
    ctx.stroke();

    my += 100;
  }

  // Subtle data wave at bottom
  const waveY = railY + railH - 60;
  ctx.strokeStyle = 'rgba(0,82,255,0.08)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let i = 0; i < railW - 48; i += 2) {
    const wx = railX + 24 + i;
    const wy = waveY + Math.sin((i + time * 20) * 0.04) * 15 + Math.sin((i + time * 10) * 0.02) * 8;
    if (i === 0) ctx.moveTo(wx, wy); else ctx.lineTo(wx, wy);
  }
  ctx.stroke();
}

// =============================================
// BACKGROUND
// =============================================
function drawBackground() {
  const bgGrad = ctx.createRadialGradient(960, 400, 0, 960, 400, 1100);
  bgGrad.addColorStop(0, 'rgba(10,14,26,1)');
  bgGrad.addColorStop(0.5, 'rgba(7,9,18,1)');
  bgGrad.addColorStop(1, 'rgba(4,5,10,1)');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, 1920, 1080);

  // Vignette
  const vig = ctx.createRadialGradient(960, 540, 200, 960, 540, 960);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.5)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, 1920, 1080);
}

// =============================================
// TRANSITION EFFECTS
// =============================================
let transitionAlpha = 0;
let focusGlow = 0; // glow on Zone B when card appears

function drawEffects() {
  // Segment transition flash
  if (transitionAlpha > 0) {
    // Blue sweep from left
    const sweepX = (1 - transitionAlpha) * 1920;
    const sweepGrad = ctx.createLinearGradient(sweepX - 200, 0, sweepX + 100, 0);
    sweepGrad.addColorStop(0, 'rgba(0,82,255,0)');
    sweepGrad.addColorStop(0.5, `rgba(0,82,255,${transitionAlpha * 0.15})`);
    sweepGrad.addColorStop(1, 'rgba(0,82,255,0)');
    ctx.fillStyle = sweepGrad;
    ctx.fillRect(0, 0, 1920, 1080);
    transitionAlpha = Math.max(0, transitionAlpha - 0.02);
  }

  // Focus glow on Zone B when card is visible
  if (focusGlow > 0) {
    const glowGrad = ctx.createRadialGradient(900, 400, 100, 900, 400, 600);
    glowGrad.addColorStop(0, `rgba(0,82,255,${focusGlow * 0.15})`);
    glowGrad.addColorStop(1, 'rgba(0,82,255,0)');
    ctx.fillStyle = glowGrad;
    ctx.fillRect(346, 65, 1114, 691);
  }

  // Activity indicator — subtle pulse dots on left rail
  const pulseAlpha = 0.15 + Math.sin(time * 2) * 0.1;
  ctx.fillStyle = `rgba(0,82,255,${pulseAlpha})`;
  ctx.beginPath();
  ctx.arc(330, 80, 3, 0, Math.PI * 2);
  ctx.fill();
}

// =============================================
// MAIN RENDER LOOP
// =============================================
function drawScene() {
  time += 0.016;
  updateHost();

  drawBackground();
  drawLeftRail();

  // Host in Zone C (right 24%, x: 1460-1920), vertically centered
  // Center of Zone C = 1690, vertical center of main area = 65 + 691/2 = 410
  // Bottom of character at ~756 (bottom of main content area)
  drawVespolak(1690, 750);

  drawEffects();

  requestAnimationFrame(drawScene);
}

// =============================================
// UTILITY
// =============================================
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function hideAllCards() {
  document.querySelectorAll('.segment-card').forEach(el => {
    el.classList.remove('visible');
  });
}

function drawSignalVisual(canvasId, type, text) {
  const cvs = document.getElementById(canvasId);
  if (!cvs) return;
  const vctx = cvs.getContext('2d');
  const w = cvs.width, h = cvs.height;
  vctx.clearRect(0, 0, w, h);

  if (type === 'launch' || /launch|live|deploy|ship|drop/i.test(text || '')) {
    for (let i = 0; i < Math.floor(w / 20); i++) {
      const bh = 10 + Math.random() * (h - 20);
      vctx.fillStyle = `rgba(34,197,94,${0.12 + Math.random() * 0.22})`;
      vctx.fillRect(i * 20 + 2, h - bh, 16, bh);
    }
  } else if (type === 'builder' || /build|dev|ship|code/i.test(text || '')) {
    for (let r = 0; r < 4; r++) for (let c = 0; c < Math.floor(w / 42); c++) {
      if (Math.random() > 0.4) {
        vctx.fillStyle = `rgba(139,92,246,${0.08 + Math.random() * 0.28})`;
        vctx.fillRect(c * 42 + 4, r * (h / 4) + 2, 38, h / 4 - 4);
      }
    }
  } else if (type === 'metric' || type === 'onchain' || /tvl|price|volume|market/i.test(text || '')) {
    vctx.strokeStyle = 'rgba(0,82,255,0.5)'; vctx.lineWidth = 2;
    vctx.beginPath();
    for (let x = 0; x < w; x += 2) {
      const y = h/2 + Math.sin(x * 0.032) * (h * 0.35) + Math.sin(x * 0.072) * (h * 0.15);
      x === 0 ? vctx.moveTo(x, y) : vctx.lineTo(x, y);
    }
    vctx.stroke();
    vctx.lineTo(w, h); vctx.lineTo(0, h); vctx.closePath();
    vctx.fillStyle = 'rgba(0,82,255,0.05)'; vctx.fill();
  } else if (type === 'market') {
    // Price bars
    vctx.strokeStyle = 'rgba(34,197,94,0.5)'; vctx.lineWidth = 2;
    vctx.beginPath();
    let prev = h / 2;
    for (let x = 0; x < w; x += 4) {
      prev += (Math.random() - 0.48) * 6;
      prev = Math.max(10, Math.min(h - 10, prev));
      x === 0 ? vctx.moveTo(x, prev) : vctx.lineTo(x, prev);
    }
    vctx.stroke();
  } else {
    for (let i = 0; i < 8; i++) {
      vctx.fillStyle = `rgba(0,82,255,${0.04 + Math.random() * 0.1})`;
      vctx.fillRect(20, i * (h / 8) + 2, 80 + Math.random() * (w * 0.5), h / 8 - 4);
    }
  }
}

    card.querySelector('.builder-tagline').textContent = data.tagline || data.subheadline || '';
    card.querySelector('.builder-body').textContent = data.body || data.text || '';
    card.querySelector('.builder-details').innerHTML =
      `Stage: <span>${data.stage || 'LIVE'}</span><br>` +
      `Traction: <span>${data.traction || 'early signal'}</span><br>` +
      `Layer: <span>${data.layer || 'DeFi'}</span>`;

    drawSignalVisual('builder-visual-canvas', 'builder', data.name);

    requestAnimationFrame(() => card.classList.add('visible'));

  } else if (type === 'onchain') {
    const card = document.getElementById('onchain-card');
    card.querySelector('.card-header-type').textContent = 'ONCHAIN READ';
    card.querySelector('.onchain-metric').textContent = data.metric || '--';
    const changeHtml = data.changeDir === 'up'
      ? `<span class="change-up">▲ ${data.change || ''}</span>`
      : data.changeDir === 'down'
      ? `<span class="change-down">▼ ${data.change || ''}</span>`
      : (data.change || '');
    card.querySelector('.onchain-label').innerHTML = (data.label || '') + ' — ' + changeHtml;
    card.querySelector('.onchain-context').textContent = data.context || '';
    card.querySelector('.onchain-supporting').textContent = data.supporting || '';

    drawSignalVisual('onchain-chart-canvas', 'onchain', data.metric);

    requestAnimationFrame(() => card.classList.add('visible'));

  } else if (type === 'market') {
    const card = document.getElementById('market-card');
    card.querySelector('.card-header-type').textContent = 'MARKET RADAR';
    card.querySelector('.market-symbol').textContent = data.symbol || '';
    card.querySelector('.market-price').textContent = data.price || '';
    const changeEl = card.querySelector('.market-change');
    changeEl.textContent = data.change || '';
    changeEl.style.color = (data.change || '').includes('▲') ? '#22c55e' : '#ef4444';
    card.querySelector('.market-analysis').textContent = data.analysis || data.text || '';
    card.querySelector('.market-link').textContent = data.ecosystemLink || '';

    drawSignalVisual('market-chart-canvas', 'market', data.symbol);

    requestAnimationFrame(() => card.classList.add('visible'));
  }
};

window.__updateTicker = function(items) {
  const track = document.getElementById('ticker-track');
  const html = items.map(item => {
    const parts = item.match(/^(.+?)\s+\$?([\d,.]+)\s*([▲▼])(.+)$/);
    if (parts) {
      const isUp = parts[3] === '▲';
      return `<span class="ticker-item">
        <span class="symbol">${parts[1]}</span>
        <span class="price">$${parts[2]}</span>
        <span class="${isUp ? 'change-up' : 'change-down'}">${parts[3]}${parts[4]}</span>
      </span><span class="ticker-sep">│</span>`;
    }
    return `<span class="ticker-item"><span class="symbol">${item}</span></span><span class="ticker-sep">│</span>`;
  }).join('');
  track.innerHTML = html + html;
};

window.__updateBottomStrip = function(tags) {
  const track = document.getElementById('bottom-strip-track');
  const html = tags.map(t =>
    `<span class="bottom-tag"><span class="tag-name">${t}</span></span>`
  ).join('');
  track.innerHTML = html + html;
};

// =============================================
// INTRO ANIMATION
// =============================================
window.__playIntro = function(episodeNumber) {
  const ic = document.getElementById('intro-canvas');
  ic.style.display = 'block';
  const ictx = ic.getContext('2d');
  let t = 0;
  const totalFrames = 180;

  function introFrame() {
    t++;
    ictx.clearRect(0, 0, 1920, 1080);

    const progress = t / totalFrames;
    const fadeIn = Math.min(1, t / 30);
    const alpha = fadeIn * (t > totalFrames - 30 ? (1 - (t - (totalFrames - 30)) / 30) : 1);

    ictx.fillStyle = `rgba(4,5,12,${alpha * 0.95})`;
    ictx.fillRect(0, 0, 1920, 1080);

    const radius = progress * 1400;
    const circAlpha = alpha * (1 - progress) * 0.3;
    ictx.strokeStyle = `rgba(0,82,255,${circAlpha})`;
    ictx.lineWidth = 2;
    ictx.beginPath();
    ictx.arc(960, 540, radius, 0, Math.PI * 2);
    ictx.stroke();

    if (t > 20) {
      const logoAlpha = Math.min(1, (t - 20) / 30) * alpha;
      ictx.globalAlpha = logoAlpha;
      ictx.fillStyle = '#0052FF';
      ictx.font = '900 96px Inter';
      ictx.textAlign = 'center';
      ictx.shadowColor = 'rgba(0,82,255,0.5)';
      ictx.shadowBlur = 40;
      ictx.fillText('BASE PULSE', 960, 500);
      ictx.shadowBlur = 0;
      ictx.fillStyle = 'rgba(255,255,255,0.5)';
      ictx.font = '400 22px Inter';
      if (episodeNumber) ictx.fillText(`EPISODE ${episodeNumber}`, 960, 560);
      ictx.textAlign = 'left';
      ictx.globalAlpha = 1;
    }

    if (t < totalFrames) {
      requestAnimationFrame(introFrame);
    } else {
      ic.style.display = 'none';
    }
  }
  requestAnimationFrame(introFrame);
};
