<script>
// =============================================
// Audio System
// =============================================
let audioCtx = null;
let analyser = null;
let currentAmplitude = 0;
let isSpeaking = false;

function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  analyser.connect(audioCtx.destination);
}

window.__playAudio = function(base64, format) {
  return new Promise(async (resolve) => {
    try {
      if (!audioCtx) initAudio();
      if (audioCtx.state === 'suspended') await audioCtx.resume();
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      const buffer = await audioCtx.decodeAudioData(bytes.buffer);
      const source = audioCtx.createBufferSource();
      source.buffer = buffer;
      source.connect(analyser);
      isSpeaking = true;
      hostState = 'speaking';
      const dataArray = new Uint8Array(analyser.frequencyBinCount);
      const ampInterval = setInterval(() => {
        analyser.getByteFrequencyData(dataArray);
        let sum = 0;
        for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
        currentAmplitude = sum / dataArray.length / 255;
      }, 50);
      source.onended = () => {
        isSpeaking = false; currentAmplitude = 0;
        hostState = 'idle';
        clearInterval(ampInterval); resolve();
      };
      source.start(0);
      setTimeout(() => {
        if (isSpeaking) { isSpeaking = false; currentAmplitude = 0; hostState = 'idle'; clearInterval(ampInterval); resolve(); }
      }, (buffer.duration + 2) * 1000);
    } catch (err) {
      console.error('Audio error:', err);
      isSpeaking = false; hostState = 'idle'; resolve();
    }
  });
};

// =============================================
// Scene Canvas (background + left rail + host)
// =============================================
const canvas = document.getElementById('scene-canvas');
const ctx = canvas.getContext('2d');

// =============================================
// GLOBAL STATE
// =============================================
let time = 0;

// Host: 3 states only
let hostState = 'idle'; // idle | speaking | reacting
let reactTimer = 0;

// Animation
let blinkTimer = 0;
let isBlinking = false;
let breathOffset = 0;

// Ecosystem data for left rail
let ecosystemData = { baseTvl: '--', ethPrice: '--', gas: '--', blockNumber: '--', dailyTxn: '--', mood: 'Neutral' };
let ecosystemFlash = { baseTvl: 0, ethPrice: 0, gas: 0, blockNumber: 0, dailyTxn: 0 };

// Current segment type for top bar
let currentSegmentType = 'monitoring';

// =============================================
// PIXEL ART — VESPOLAK (PX = 8, no cigarette)
// =============================================
const PX = 8;

function px(n) { return n * PX; }

const COLORS = {
  skin:   '#8B5E3C',
  skin2:  '#7A5030',
  hair:   '#F5D44A',
  hair2:  '#E8C020',
  shirt:  '#1a1a2e',
  shirt2: '#12122a',
  blue:   '#0052FF',
  blue2:  '#003ecc',
  pants:  '#1c1c2e',
  pants2: '#141426',
  belt:   '#2a2020',
  shoe:   '#111118',
  shoeS:  '#0044dd',
  white:  '#f0f0f0',
  eye:    '#0a0a0a',
};

function buildCharacterPixels() {
  const pixels = [];
  function row(r, segments) {
    for (const [c0, c1, col] of segments) {
      for (let c = c0; c <= c1; c++) pixels.push([c, r, col]);
    }
  }

  // HAIR — messy blond
  row(0,  [[8,11,'hair2'],[12,20,'hair'],[21,23,'hair2']]);
  row(1,  [[6,9,'hair2'],[10,22,'hair'],[23,25,'hair2'],[7,7,'hair2']]);
  row(2,  [[5,7,'hair2'],[8,11,'hair'],[12,22,'hair'],[23,26,'hair2']]);
  row(3,  [[6,8,'hair2'],[9,10,'hair'],[11,21,'hair'],[22,25,'hair2'],[24,24,'hair']]);
  row(4,  [[7,9,'hair2'],[10,11,'skin'],[12,20,'skin'],[21,22,'hair2'],[23,26,'hair2']]);
  row(5,  [[8,9,'hair2'],[10,11,'skin'],[12,21,'skin'],[22,24,'hair']]);
  // Stray hair spikes
  row(0, [[4,5,'hair2'],[26,27,'hair2']]);
  row(1, [[3,4,'hair2'],[27,28,'hair']]);
  row(2, [[4,5,'hair']]);

  // FACE — rows 4-13
  row(6,  [[10,21,'skin']]);
  row(7,  [[9,22,'skin']]);
  row(8,  [[9,22,'skin']]);
  row(9,  [[9,22,'skin']]);
  row(10, [[9,22,'skin']]);
  row(11, [[9,22,'skin']]);
  row(12, [[9,22,'skin']]);
  row(13, [[10,21,'skin']]);

  // Eyes — tiny black dots
  row(8,  [[12,13,'eye'],[19,20,'eye']]);
  row(9,  [[12,13,'eye'],[19,20,'eye']]);

  // Mouth area — no cigarette, just subtle skin shadow
  row(12, [[14,14,'skin2'],[15,17,'skin2'],[18,18,'skin2']]);

  // NECK
  row(14, [[13,19,'skin']]);

const CHARACTER_PIXELS = buildCharacterPixels();
const CHAR_W = 32;
const CHAR_H = 46;

// Mouth frames for speaking: 0=closed, 1=slightly open, 2=open
let mouthFrame = 0;
let mouthTimer = 0;

// Eyebrow raise for reacting
let browRaise = 0;
let browRaiseTarget = 0;

function drawVespolak(cx, bottomY) {
  const breath = Math.sin(time * 1.3) * 1.2;
  const sway = Math.sin(time * 0.5) * 1.5; // subtle idle sway

  const ox = cx - (CHAR_W / 2) * PX + sway;
  const oy = bottomY - CHAR_H * PX + breath;

  ctx.save();

  // Draw pixels
  for (const [col, row, colorKey] of CHARACTER_PIXELS) {
    let pixX = ox + col * PX;
    let pixY = oy + row * PX;
    // Subtle head micro-nod when speaking
    if (row < 16 && hostState === 'speaking') {
      pixY += Math.sin(time * 3) * 0.8;
    }
    ctx.fillStyle = COLORS[colorKey] || '#ff00ff';
    ctx.fillRect(Math.round(pixX), Math.round(pixY), PX, PX);
  }

  // Draw eyes (with blink + looking left toward Zone B)
  drawEyes(ox, oy);

  // Draw mouth based on state
  drawMouth(ox, oy);

  // Draw eyebrow raise for reacting
  if (browRaise > 0.1) {
    drawBrowRaise(ox, oy);
  }

  ctx.restore();

  // Subtle ambient glow under character
  const glowGrad = ctx.createRadialGradient(cx + sway, bottomY - 10, 10, cx + sway, bottomY - 10, 200);
  glowGrad.addColorStop(0, 'rgba(0,82,255,0.05)');
  glowGrad.addColorStop(1, 'rgba(0,82,255,0)');
  ctx.fillStyle = glowGrad;
  ctx.beginPath();
  ctx.ellipse(cx + sway, bottomY - 10, 200, 60, 0, 0, Math.PI * 2);
  ctx.fill();
}

function drawEyes(ox, oy) {
  const eyeRows = [8, 9];
  const leftCols = [12, 13];
  const rightCols = [19, 20];
  // Eyes look slightly left (toward Zone B content)
  const lookOffset = -1;

  const drawEye = (cols, rows) => {
    for (const r of rows) {
      for (const c of cols) {
        const pixX = ox + (c + lookOffset) * PX;
        const pixY = oy + r * PX;
        if (isBlinking) {
          ctx.fillStyle = COLORS.skin;
          ctx.fillRect(Math.round(pixX), Math.round(pixY), PX, PX);
          if (r === 8) {
            ctx.fillStyle = COLORS.skin2;
            ctx.fillRect(Math.round(pixX), Math.round(pixY + PX * 0.4), PX, PX * 0.3);
          }
        } else {
          ctx.fillStyle = COLORS.eye;
          ctx.fillRect(Math.round(pixX), Math.round(pixY), PX, PX);
        }
      }
    }
  };

  drawEye(leftCols, eyeRows);
  drawEye(rightCols, eyeRows);
}

function drawMouth(ox, oy) {
  // Mouth at rows 12-13, cols 14-18
  if (hostState === 'speaking' && mouthFrame > 0) {
    // Open mouth
    const mouthCols = mouthFrame === 2 ? [14,15,16,17,18] : [15,16,17];
    for (const c of mouthCols) {
      const pixX = ox + c * PX;
      const pixY = oy + 12 * PX;
      ctx.fillStyle = '#3a2018'; // dark mouth interior
      ctx.fillRect(Math.round(pixX), Math.round(pixY), PX, PX);
    }
  }
}

function drawBrowRaise(ox, oy) {
  // Draw raised eyebrows above eyes (row 7)
  const browY = oy + (7 - browRaise * 1.2) * PX;
  ctx.fillStyle = COLORS.hair2;
  // Left brow
  ctx.fillRect(Math.round(ox + 11 * PX), Math.round(browY), PX * 3, PX * 0.6);
  // Right brow
  ctx.fillRect(Math.round(ox + 18 * PX), Math.round(browY), PX * 3, PX * 0.6);
}

// =============================================
// HOST STATE UPDATES
// =============================================
function updateHost() {
  // Blink
  blinkTimer += 0.016;
  if (!isBlinking && blinkTimer > 3 + Math.random() * 4) {
    isBlinking = true;
    blinkTimer = 0;
    setTimeout(() => { isBlinking = false; }, 120);
  }

  // Mouth animation when speaking
  if (hostState === 'speaking') {
    mouthTimer += 0.016;
    if (mouthTimer > 0.1) {
      mouthTimer = 0;
      // Proportional to amplitude
      if (currentAmplitude > 0.15) mouthFrame = 2;
      else if (currentAmplitude > 0.05) mouthFrame = 1;
      else mouthFrame = 0;
    }
  } else {
    mouthFrame = 0;
  }

  // Reacting state — eyebrow raise for 0.5s then return
  if (hostState === 'reacting') {
    reactTimer -= 0.016;
    browRaiseTarget = 1;
    if (reactTimer <= 0) {
      hostState = 'idle';
      browRaiseTarget = 0;
    }
  } else {
    browRaiseTarget = 0;
  }
  browRaise += (browRaiseTarget - browRaise) * 0.15;
}

// =============================================
// LEFT DATA RAIL (Zone A) — drawn on canvas
// =============================================
function drawLeftRail() {
  const railX = 0;
  const railY = 65;
  const railW = 346;
  const railH = 691;

  // Subtle background
  ctx.fillStyle = 'rgba(6,8,16,0.6)';
  ctx.fillRect(railX, railY, railW, railH);

  // Right border
  ctx.strokeStyle = 'rgba(0,82,255,0.08)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(railX + railW, railY);
  ctx.lineTo(railX + railW, railY + railH);
  ctx.stroke();

  // Section header
  ctx.fillStyle = 'rgba(0,82,255,0.4)';
  ctx.font = '800 9px Inter';
  ctx.letterSpacing = '2px';
  ctx.fillText('ECOSYSTEM', railX + 24, railY + 32);
  ctx.letterSpacing = '0px';

  // Metrics
  const metrics = [
    { label: 'TVL', value: ecosystemData.baseTvl, key: 'baseTvl' },
    { label: 'ETH', value: ecosystemData.ethPrice, key: 'ethPrice' },
    { label: 'GAS', value: ecosystemData.gas, key: 'gas' },
    { label: 'BLOCK', value: ecosystemData.blockNumber, key: 'blockNumber' },
    { label: 'DAILY TXN', value: ecosystemData.dailyTxn, key: 'dailyTxn' },
    { label: 'MOOD', value: ecosystemData.mood || 'Neutral', key: 'mood' },
  ];

  let my = railY + 56;
  for (const m of metrics) {
    const flash = ecosystemFlash[m.key] || 0;
    if (flash > 0) ecosystemFlash[m.key] = Math.max(0, flash - 0.02);

    // Label
    ctx.fillStyle = `rgba(0,82,255,${0.35 + flash * 0.4})`;
    ctx.font = '700 9px Inter';
    ctx.letterSpacing = '1px';
    ctx.fillText(m.label, railX + 24, my);
    ctx.letterSpacing = '0px';

    // Value
    ctx.fillStyle = `rgba(200,215,240,${0.7 + flash * 0.3})`;
    ctx.font = '600 18px JetBrains Mono';
    ctx.fillText(m.value || '--', railX + 24, my + 22);

    // Subtle separator
    ctx.strokeStyle = 'rgba(0,82,255,0.05)';
    ctx.beginPath();
    ctx.moveTo(railX + 24, my + 36);
    ctx.lineTo(railX + railW - 24, my + 36);
    ctx.stroke();

    my += 100;
  }

  // Subtle data wave at bottom
  const waveY = railY + railH - 60;
  ctx.strokeStyle = 'rgba(0,82,255,0.08)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let i = 0; i < railW - 48; i += 2) {
    const wx = railX + 24 + i;
    const wy = waveY + Math.sin((i + time * 20) * 0.04) * 15 + Math.sin((i + time * 10) * 0.02) * 8;
    if (i === 0) ctx.moveTo(wx, wy); else ctx.lineTo(wx, wy);
  }
  ctx.stroke();
}

// =============================================
// BACKGROUND
// =============================================
function drawBackground() {
  const bgGrad = ctx.createRadialGradient(960, 400, 0, 960, 400, 1100);
  bgGrad.addColorStop(0, 'rgba(10,14,26,1)');
  bgGrad.addColorStop(0.5, 'rgba(7,9,18,1)');
  bgGrad.addColorStop(1, 'rgba(4,5,10,1)');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, 1920, 1080);

  // Vignette
  const vig = ctx.createRadialGradient(960, 540, 200, 960, 540, 960);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.5)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, 1920, 1080);
}

// =============================================
// TRANSITION EFFECTS
// =============================================
let transitionAlpha = 0;

function drawEffects() {
  if (transitionAlpha > 0) {
    ctx.fillStyle = `rgba(0,52,200,${transitionAlpha * 0.08})`;
    ctx.fillRect(0, 0, 1920, 1080);
    transitionAlpha = Math.max(0, transitionAlpha - 0.04);
  }
}

// =============================================
// MAIN RENDER LOOP
// =============================================
function drawScene() {
  time += 0.016;
  updateHost();

  drawBackground();
  drawLeftRail();

  // Host in Zone C (right 24%, x: 1460-1920), vertically centered
  // Center of Zone C = 1690, vertical center of main area = 65 + 691/2 = 410
  // Bottom of character at ~756 (bottom of main content area)
  drawVespolak(1690, 750);

  drawEffects();

  requestAnimationFrame(drawScene);
}

// =============================================
// UTILITY
// =============================================
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawSignalVisual(canvasId, type, text) {
  const cvs = document.getElementById(canvasId);
  if (!cvs) return;
  const vctx = cvs.getContext('2d');
  const w = cvs.width, h = cvs.height;
  vctx.clearRect(0, 0, w, h);

  if (type === 'launch' || /launch|live|deploy|ship|drop/i.test(text || '')) {
    for (let i = 0; i < Math.floor(w / 20); i++) {
      const bh = 10 + Math.random() * (h - 20);
      vctx.fillStyle = `rgba(34,197,94,${0.12 + Math.random() * 0.22})`;
      vctx.fillRect(i * 20 + 2, h - bh, 16, bh);
    }
  } else if (type === 'builder' || /build|dev|ship|code/i.test(text || '')) {
    for (let r = 0; r < 4; r++) for (let c = 0; c < Math.floor(w / 42); c++) {
      if (Math.random() > 0.4) {
        vctx.fillStyle = `rgba(139,92,246,${0.08 + Math.random() * 0.28})`;
        vctx.fillRect(c * 42 + 4, r * (h / 4) + 2, 38, h / 4 - 4);
      }
    }
  } else if (type === 'metric' || type === 'onchain' || /tvl|price|volume|market/i.test(text || '')) {
    vctx.strokeStyle = 'rgba(0,82,255,0.5)'; vctx.lineWidth = 2;
    vctx.beginPath();
    for (let x = 0; x < w; x += 2) {
      const y = h/2 + Math.sin(x * 0.032) * (h * 0.35) + Math.sin(x * 0.072) * (h * 0.15);
      x === 0 ? vctx.moveTo(x, y) : vctx.lineTo(x, y);
    }
    vctx.stroke();
    vctx.lineTo(w, h); vctx.lineTo(0, h); vctx.closePath();
    vctx.fillStyle = 'rgba(0,82,255,0.05)'; vctx.fill();
  } else if (type === 'market') {
    // Price bars
    vctx.strokeStyle = 'rgba(34,197,94,0.5)'; vctx.lineWidth = 2;
    vctx.beginPath();
    let prev = h / 2;
    for (let x = 0; x < w; x += 4) {
      prev += (Math.random() - 0.48) * 6;
      prev = Math.max(10, Math.min(h - 10, prev));
      x === 0 ? vctx.moveTo(x, prev) : vctx.lineTo(x, prev);
    }
    vctx.stroke();
  } else {
    for (let i = 0; i < 8; i++) {
      vctx.fillStyle = `rgba(0,82,255,${0.04 + Math.random() * 0.1})`;
      vctx.fillRect(20, i * (h / 8) + 2, 80 + Math.random() * (w * 0.5), h / 8 - 4);
    }
  }
}

window.__showSegmentCard = function(type, data) {
  hideAllCards();

  if (type === 'social') {
    const card = document.getElementById('social-card');
    card.querySelector('.card-header-type').textContent = 'SOCIAL SIGNAL';
    card.querySelector('.card-header-icon').textContent = data.platform === 'farcaster' ? '◈ Farcaster' : '𝕏';
    card.querySelector('.social-avatar').textContent = (data.displayName || '?')[0].toUpperCase();
    card.querySelector('.social-display-name').textContent = data.displayName || data.username || 'Unknown';
    card.querySelector('.social-username').textContent = '@' + (data.username || 'unknown');
    card.querySelector('.social-text').textContent = data.text || '';

    const engParts = [];
    if (data.likes) engParts.push(`♡ <span>${data.likes}</span>`);
    if (data.retweets) engParts.push(`↻ <span>${data.retweets}</span>`);
    if (data.replies) engParts.push(`💬 <span>${data.replies}</span>`);
    card.querySelector('.social-engagement').innerHTML = engParts.join('  ') || '';

    // Tag
    const tagEl = card.querySelector('.social-tag');
    const tagMap = { builder: 'BUILDER', launch: 'LAUNCH', culture: 'CULTURE', market: 'MARKET', commentary: 'COMMENTARY' };
    const tagClass = { builder: 'tag-builder', launch: 'tag-launch', culture: 'tag-culture', market: 'tag-market', commentary: 'tag-commentary' };
    const st = data.signalType || 'commentary';
    tagEl.textContent = tagMap[st] || st.toUpperCase();
    tagEl.className = 'social-tag ' + (tagClass[st] || 'tag-commentary');

    // Signal type color on avatar
    const avatarColors = {
      builder: 'linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%)',
      launch: 'linear-gradient(135deg, #22c55e 0%, #16a34a 100%)',
      culture: 'linear-gradient(135deg, #ec4899 0%, #db2777 100%)',
      market: 'linear-gradient(135deg, #0052FF 0%, #003bb5 100%)',
    };
    card.querySelector('.social-avatar').style.background = avatarColors[st] || avatarColors.market;

    drawSignalVisual('social-visual-canvas', st, data.text);

    requestAnimationFrame(() => card.classList.add('visible'));

  } else if (type === 'builder') {
    const card = document.getElementById('builder-card');
    card.querySelector('.card-header-type').textContent = 'BUILDER SIGNAL';
    card.querySelector('.builder-name').textContent = data.name || data.headline || '';
    card.querySelector('.builder-tagline').textContent = data.tagline || data.subheadline || '';
    card.querySelector('.builder-body').textContent = data.body || data.text || '';
    card.querySelector('.builder-details').innerHTML =
      `Stage: <span>${data.stage || 'LIVE'}</span><br>` +
      `Traction: <span>${data.traction || 'early signal'}</span><br>` +
      `Layer: <span>${data.layer || 'DeFi'}</span>`;

    drawSignalVisual('builder-visual-canvas', 'builder', data.name);

    requestAnimationFrame(() => card.classList.add('visible'));

  } else if (type === 'onchain') {
    const card = document.getElementById('onchain-card');
    card.querySelector('.card-header-type').textContent = 'ONCHAIN READ';
    card.querySelector('.onchain-metric').textContent = data.metric || '--';
    const changeHtml = data.changeDir === 'up'
      ? `<span class="change-up">▲ ${data.change || ''}</span>`
      : data.changeDir === 'down'
      ? `<span class="change-down">▼ ${data.change || ''}</span>`
      : (data.change || '');
    card.querySelector('.onchain-label').innerHTML = (data.label || '') + ' — ' + changeHtml;
    card.querySelector('.onchain-context').textContent = data.context || '';
    card.querySelector('.onchain-supporting').textContent = data.supporting || '';

    drawSignalVisual('onchain-chart-canvas', 'onchain', data.metric);

    requestAnimationFrame(() => card.classList.add('visible'));

  } else if (type === 'market') {
    const card = document.getElementById('market-card');
    card.querySelector('.card-header-type').textContent = 'MARKET RADAR';
    card.querySelector('.market-symbol').textContent = data.symbol || '';
    card.querySelector('.market-price').textContent = data.price || '';
    const changeEl = card.querySelector('.market-change');
    changeEl.textContent = data.change || '';
    changeEl.style.color = (data.change || '').includes('▲') ? '#22c55e' : '#ef4444';
    card.querySelector('.market-analysis').textContent = data.analysis || data.text || '';
    card.querySelector('.market-link').textContent = data.ecosystemLink || '';

    drawSignalVisual('market-chart-canvas', 'market', data.symbol);

    requestAnimationFrame(() => card.classList.add('visible'));
  }
};

window.__updateTicker = function(items) {
  const track = document.getElementById('ticker-track');
  const html = items.map(item => {
    const parts = item.match(/^(.+?)\s+\$?([\d,.]+)\s*([▲▼])(.+)$/);
    if (parts) {
      const isUp = parts[3] === '▲';
      return `<span class="ticker-item">
        <span class="symbol">${parts[1]}</span>
        <span class="price">$${parts[2]}</span>
        <span class="${isUp ? 'change-up' : 'change-down'}">${parts[3]}${parts[4]}</span>
      </span><span class="ticker-sep">│</span>`;
    }
    return `<span class="ticker-item"><span class="symbol">${item}</span></span><span class="ticker-sep">│</span>`;
  }).join('');
  track.innerHTML = html + html;
};

window.__updateBottomStrip = function(tags) {
  const track = document.getElementById('bottom-strip-track');
  const html = tags.map(t =>
    `<span class="bottom-tag"><span class="tag-name">${t}</span></span>`
  ).join('');
  track.innerHTML = html + html;
};

};

// =============================================

window.__playIntro = function(episodeNumber) {
  const ic = document.getElementById('intro-canvas');
  ic.style.display = 'block';
  const ictx = ic.getContext('2d');
  let t = 0;
  const totalFrames = 180;

  function introFrame() {
    t++;
    ictx.clearRect(0, 0, 1920, 1080);

    const progress = t / totalFrames;
    const fadeIn = Math.min(1, t / 30);
    const alpha = fadeIn * (t > totalFrames - 30 ? (1 - (t - (totalFrames - 30)) / 30) : 1);

    ictx.fillStyle = `rgba(4,5,12,${alpha * 0.95})`;
    ictx.fillRect(0, 0, 1920, 1080);

    const radius = progress * 1400;
    const circAlpha = alpha * (1 - progress) * 0.3;
    ictx.strokeStyle = `rgba(0,82,255,${circAlpha})`;
    ictx.lineWidth = 2;
    ictx.beginPath();
    ictx.arc(960, 540, radius, 0, Math.PI * 2);
    ictx.stroke();

    if (t > 20) {
      const logoAlpha = Math.min(1, (t - 20) / 30) * alpha;
      ictx.globalAlpha = logoAlpha;
      ictx.fillStyle = '#0052FF';
      ictx.font = '900 96px Inter';
      ictx.textAlign = 'center';
      ictx.shadowColor = 'rgba(0,82,255,0.5)';
      ictx.shadowBlur = 40;
      ictx.fillText('BASE PULSE', 960, 500);
      ictx.shadowBlur = 0;
      ictx.fillStyle = 'rgba(255,255,255,0.5)';
      ictx.font = '400 22px Inter';
      if (episodeNumber) ictx.fillText(`EPISODE ${episodeNumber}`, 960, 560);
      ictx.textAlign = 'left';
      ictx.globalAlpha = 1;
    }

    if (t < totalFrames) {
      requestAnimationFrame(introFrame);
    } else {
      ic.style.display = 'none';
    }
  }
  requestAnimationFrame(introFrame);
};
