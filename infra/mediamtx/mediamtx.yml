###############################################
# MediaMTX config for LiveClaw
###############################################

logLevel: info
logDestinations: [stdout]

# Disable auth for local dev
authInternalUsers:
  - user: any
    pass: ""
    permissions:
      - action: publish
      - action: read
      - action: playback
      - action: api

# API (used by reconciliation + health checks)
api: yes
apiAddress: :9997
apiEncryption: no
apiServerKey: ''
apiServerCert: ''
apiAllowOrigin: '*'

# RTMP server (agents/encoders push here)
rtmp: yes
rtmpAddress: :1935

# HLS server (viewers consume via browser)
hls: yes
hlsAddress: :8888
hlsVariant: lowLatency
hlsSegmentCount: 10
hlsSegmentDuration: 2s
hlsPartDuration: 500ms
hlsSegmentMaxSize: 50M
hlsAllowOrigin: "*"

# RTSP (optional, for debugging/monitoring)
rtsp: yes
rtspAddress: :8554

# WebRTC (disabled for now)
webrtc: no

# Accept any stream key as a valid path
paths:
  all_others:

# Paths — accept any stream key as path
pathDefaults:
  source: publisher
  # runOnReady fires when a source starts publishing on a path.
  # runOnNotReady fires when the source disconnects.
  # These replaced runOnPublish/runOnUnpublish in MediaMTX >= 1.4.0.
  runOnReady: >-
    wget -q -O /dev/null
    --header='Content-Type: application/json'
    --header='X-Webhook-Secret: ${WEBHOOK_SECRET}'
    --post-data='{"event":"publish","path":"/$MTX_PATH"}'
    ${API_URL}/streams/webhook/mediamtx
  runOnNotReady: >-
    wget -q -O /dev/null
    --header='Content-Type: application/json'
    --header='X-Webhook-Secret: ${WEBHOOK_SECRET}'
    --post-data='{"event":"unpublish","path":"/$MTX_PATH"}'
    ${API_URL}/streams/webhook/mediamtx
