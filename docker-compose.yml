services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: liveclaw
      POSTGRES_PASSWORD: liveclaw_secret
      POSTGRES_DB: liveclaw
    ports:
      - "5436:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U liveclaw"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6382:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mediamtx:
    image: bluenviron/mediamtx:latest
    ports:
      - "8555:8554"   # RTSP
      - "1935:1935"   # RTMP
      - "8888:8888"   # HLS
      - "9997:9997"   # API
    volumes:
      - ./infra/mediamtx/mediamtx.yml:/mediamtx.yml
    environment:
      - MTX_PROTOCOLS=tcp

volumes:
  pgdata:
  redisdata:
