<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280,height=720">
<title>CodeBot - Live Coding Session</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap');

  :root {
    --bg: #1e1e2e;
    --bg-lighter: #252538;
    --bg-sidebar: #1a1a2a;
    --bg-tab-active: #1e1e2e;
    --bg-tab: #16161e;
    --bg-statusbar: #12121e;
    --bg-topbar: #16161e;
    --border: #2a2a3e;
    --text: #cdd6f4;
    --text-dim: #6c7086;
    --text-dimmer: #45475a;
    --accent: #89b4fa;
    --green: #a6e3a1;
    --purple: #cba6f7;
    --pink: #f5c2e7;
    --yellow: #f9e2af;
    --orange: #fab387;
    --red: #f38ba8;
    --teal: #94e2d5;
    --blue: #89b4fa;
    --mauve: #cba6f7;
    --peach: #fab387;
    --sky: #89dceb;
  }

  body {
    width: 1280px;
    height: 720px;
    overflow: hidden;
    background: var(--bg);
    font-family: 'JetBrains Mono', monospace;
    color: var(--text);
  }

  .container {
    display: flex;
    flex-direction: column;
    height: 720px;
    width: 1280px;
  }

  /* Top Bar */
  .topbar {
    height: 36px;
    background: var(--bg-topbar);
    display: flex;
    align-items: center;
    padding: 0 12px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
    user-select: none;
  }
  .topbar-dots { display: flex; gap: 6px; }
  .topbar-dot {
    width: 11px; height: 11px; border-radius: 50%;
  }
  .dot-red { background: #f38ba8; }
  .dot-yellow { background: #f9e2af; }
  .dot-green { background: #a6e3a1; }
  .topbar-title {
    flex: 1;
    text-align: center;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-dim);
    letter-spacing: 0.3px;
  }
  .topbar-title span { color: var(--accent); font-weight: 600; }

  /* Tabs */
  .tabs {
    height: 34px;
    background: var(--bg-tab);
    display: flex;
    align-items: flex-end;
    border-bottom: 1px solid var(--border);
    padding-left: 200px;
    overflow: hidden;
    user-select: none;
  }
  .tab {
    height: 30px;
    padding: 0 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-dim);
    background: var(--bg-tab);
    border-right: 1px solid var(--border);
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .tab.active {
    background: var(--bg-tab-active);
    color: var(--text);
    border-bottom: 2px solid var(--accent);
  }
  .tab-icon { font-size: 14px; }
  .tab-icon.py { color: #f9e2af; }
  .tab-icon.ts { color: #89b4fa; }
  .tab-icon.js { color: #f9e2af; }
  .tab-icon.jsx { color: #89dceb; }

  /* Main Area */
  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* Sidebar */
  .sidebar {
    width: 200px;
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border);
    padding: 8px 0;
    overflow-y: auto;
    user-select: none;
    flex-shrink: 0;
  }
  .sidebar-title {
    padding: 4px 14px 8px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-dim);
  }
  .tree-item {
    padding: 3px 14px 3px 20px;
    font-size: 12px;
    color: var(--text-dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.1s;
  }
  .tree-item:hover { background: rgba(137,180,250,0.06); }
  .tree-item.active {
    background: rgba(137,180,250,0.1);
    color: var(--text);
  }
  .tree-folder {
    padding: 3px 14px;
    font-size: 12px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
  }
  .tree-folder::before { content: "\25BE"; font-size: 10px; color: var(--text-dimmer); }
  .tree-indent { padding-left: 32px; }

  /* Editor */
  .editor-wrap {
    flex: 1;
    display: flex;
    overflow: hidden;
  }
  .line-numbers {
    width: 52px;
    background: var(--bg);
    padding: 8px 0;
    text-align: right;
    padding-right: 12px;
    font-size: 13px;
    line-height: 21px;
    color: var(--text-dimmer);
    user-select: none;
    flex-shrink: 0;
  }
  .line-numbers .active-ln { color: var(--text-dim); }
  .editor {
    flex: 1;
    padding: 8px 0 8px 8px;
    font-size: 13px;
    line-height: 21px;
    overflow: hidden;
    position: relative;
    white-space: pre;
  }
  .editor-line {
    min-height: 21px;
    white-space: pre;
  }

  /* Cursor */
  .cursor {
    display: inline-block;
    width: 2px;
    height: 16px;
    background: var(--accent);
    vertical-align: text-bottom;
    animation: blink 1s step-end infinite;
    margin-left: 1px;
  }
  @keyframes blink {
    50% { opacity: 0; }
  }

  /* Status Bar */
  .statusbar {
    height: 24px;
    background: var(--bg-statusbar);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 12px;
    font-size: 11px;
    color: var(--text-dim);
    gap: 16px;
    user-select: none;
  }
  .statusbar-left { display: flex; align-items: center; gap: 14px; }
  .statusbar-right { margin-left: auto; display: flex; align-items: center; gap: 14px; }
  .status-brand {
    color: var(--accent);
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  .status-lang {
    background: rgba(137,180,250,0.12);
    padding: 1px 8px;
    border-radius: 3px;
    color: var(--accent);
  }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Syntax colors */
  .syn-kw { color: var(--mauve); }
  .syn-fn { color: var(--blue); }
  .syn-str { color: var(--green); }
  .syn-num { color: var(--peach); }
  .syn-cmt { color: var(--text-dimmer); font-style: italic; }
  .syn-type { color: var(--yellow); }
  .syn-op { color: var(--sky); }
  .syn-dec { color: var(--pink); }
  .syn-param { color: var(--peach); }
  .syn-const { color: var(--red); }
  .syn-tag { color: var(--red); }
  .syn-attr { color: var(--yellow); }
  .syn-punct { color: var(--text-dim); }
  .syn-self { color: var(--red); font-style: italic; }
  .syn-bool { color: var(--peach); }
  .syn-builtin { color: var(--teal); }
</style>
</head>

// --- Engine ---
const editorEl = document.getElementById('editor');
const lineNumEl = document.getElementById('lineNumbers');
const tabsEl = document.getElementById('tabs');
const sidebarEl = document.getElementById('sidebar');
const statusLang = document.getElementById('statusLang');
const statusInfo = document.getElementById('statusInfo');
const statusChars = document.getElementById('statusChars');

let currentLines = [];
let currentLineIdx = 0;
let currentCharIdx = 0;
let totalChars = 0;
let projectIdx = 0;
let isTyping = false;

function renderTabs(project) {
  tabsEl.innerHTML = project.tabs.map(t =>
    `<div class="tab ${t.active ? 'active' : ''}"><span class="tab-icon ${t.icon}">${
      t.icon === 'py' ? '\u{1F40D}' : t.icon === 'ts' ? 'TS' : t.icon === 'jsx' ? '\u269B' : 'JS'
    }</span>${t.name}</div>`
  ).join('');
}

function renderSidebar(project) {
  sidebarEl.innerHTML = '<div class="sidebar-title">Explorer</div>' +
    project.tree.map(item => {
      if (item.type === 'folder') {
        return `<div class="tree-folder${item.indent ? ' tree-indent' : ''}">${item.name}</div>`;
      }
      let cls = 'tree-item';
      if (item.active) cls += ' active';
      if (item.indent) cls += ' tree-indent';
      if (item.deep) cls = cls.replace('tree-indent', '') + ' tree-indent';
      let pad = item.deep ? 'padding-left:44px' : (item.indent ? '' : '');
      return `<div class="${cls}" style="${pad}">${item.name}</div>`;
    }).join('');
}

function renderLineNumbers(count, activeLine) {
  let html = '';
  for (let i = 1; i <= count; i++) {
    html += `<div class="${i === activeLine ? 'active-ln' : ''}">${i}</div>`;
  }
  lineNumEl.innerHTML = html;
}

function renderLines() {
  let html = '';
  for (let i = 0; i < currentLines.length; i++) {
    html += `<div class="editor-line">${currentLines[i]}${i === currentLines.length - 1 ? '<span class="cursor"></span>' : ''}</div>`;
  }
  editorEl.innerHTML = html;

  // Auto-scroll if needed
  const lastLine = editorEl.lastElementChild;
  if (lastLine) {
    const rect = lastLine.getBoundingClientRect();
    const editorRect = editorEl.parentElement.getBoundingClientRect();
    if (rect.bottom > editorRect.bottom - 20) {
      editorEl.style.transform = `translateY(-${(currentLines.length - 28) * 21}px)`;
    }
  }
}

function tokenToHTML(token) {
  const [text, cls] = token;
  if (!cls) return escapeHTML(text);
  return `<span class="${cls}">${escapeHTML(text)}</span>`;
}

function escapeHTML(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function lineToFullHTML(lineObj) {
  if (lineObj.tokens) {
    return lineObj.tokens.map(tokenToHTML).join('');
  }
  if (lineObj.classes && lineObj.classes.length) {
    return `<span class="${lineObj.classes[0]}">${escapeHTML(lineObj.text)}</span>`;
  }
  return escapeHTML(lineObj.text);
}

function getTypingDelay(char, lineObj) {
  // Vary speed based on content
  if (char === ' ' && Math.random() > 0.7) return 15; // fast spaces
  if (char === '\n') return 80 + Math.random() * 120;

  // "Thinking" pauses before certain constructs
  const text = lineObj.text;
  if (text.includes('class ') || text.includes('async ') || text.includes('def ') || text.includes('function ')) {
    if (Math.random() > 0.85) return 200 + Math.random() * 400; // thinking pause
  }

  // Comments are typed faster (bot "knows" what to say)
  if (text.trim().startsWith('#') || text.trim().startsWith('//') || text.trim().startsWith('*')) {
    return 15 + Math.random() * 25;
  }

  // Boilerplate (imports, brackets) faster
  if (text.startsWith('import ') || text.startsWith('from ') || text.trim() === '{' || text.trim() === '}') {
    return 18 + Math.random() * 22;
  }

  return 25 + Math.random() * 45;
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

async function typeProject(project) {
  renderTabs(project);
  renderSidebar(project);
  statusLang.textContent = project.lang;
  editorEl.style.transform = 'translateY(0)';
  currentLines = [''];
  totalChars = 0;

  renderLines();
  renderLineNumbers(1, 1);
  await sleep(1200); // pause before starting

  for (let li = 0; li < project.lines.length; li++) {
    const lineObj = project.lines[li];
    const fullHTML = lineToFullHTML(lineObj);
    const plainText = lineObj.text;

    // Type character by character using plain text for timing
    let partialHTML = '';
    if (lineObj.tokens) {
      // Build up token by token, char by char
      let built = '';
      for (let ti = 0; ti < lineObj.tokens.length; ti++) {
        const [tokText, tokClass] = lineObj.tokens[ti];
        for (let ci = 0; ci < tokText.length; ci++) {
          built += tokText[ci];
          totalChars++;

          // Rebuild partial HTML: completed tokens + partial current token
          let html = '';
          for (let pt = 0; pt < ti; pt++) {
            html += tokenToHTML(lineObj.tokens[pt]);
          }
          const partialTok = tokText.substring(0, ci + 1);
          html += tokClass ? `<span class="${tokClass}">${escapeHTML(partialTok)}</span>` : escapeHTML(partialTok);

          currentLines[currentLines.length - 1] = html;
          renderLines();

          statusInfo.textContent = `Ln ${currentLines.length}, Col ${built.length}`;
          statusChars.textContent = `Lines: ${currentLines.length}, Chars: ${totalChars}`;

          await sleep(getTypingDelay(tokText[ci], lineObj));
        }
      }
    } else if (lineObj.classes && lineObj.classes.length) {
      for (let ci = 0; ci < plainText.length; ci++) {
        totalChars++;
        const partial = plainText.substring(0, ci + 1);
        currentLines[currentLines.length - 1] = `<span class="${lineObj.classes[0]}">${escapeHTML(partial)}</span>`;
        renderLines();
        statusInfo.textContent = `Ln ${currentLines.length}, Col ${ci + 1}`;
        statusChars.textContent = `Lines: ${currentLines.length}, Chars: ${totalChars}`;
        await sleep(getTypingDelay(plainText[ci], lineObj));
      }
    } else {
      // Empty line or plain
      if (plainText === '') {
        // just press enter
      } else {
        for (let ci = 0; ci < plainText.length; ci++) {
          totalChars++;
          currentLines[currentLines.length - 1] = escapeHTML(plainText.substring(0, ci + 1));
          renderLines();
          await sleep(getTypingDelay(plainText[ci], lineObj));
        }
      }
    }

    // "Enter" — new line
    if (li < project.lines.length - 1) {
      // Finalize current line with full HTML
      currentLines[currentLines.length - 1] = fullHTML;
      currentLines.push('');
      renderLines();
      renderLineNumbers(currentLines.length, currentLines.length);
      await sleep(40 + Math.random() * 60);
    } else {
      currentLines[currentLines.length - 1] = fullHTML;
      renderLines();
    }

    // Occasional "thinking" pause between logical blocks
    if (plainText === '' && Math.random() > 0.5) {
      await sleep(300 + Math.random() * 500);
    }
  }
}

async function runLoop() {
  while (true) {
    const project = projects[projectIdx % projects.length];
    await typeProject(project);

    // Pause at end to admire the work
    await sleep(4000);

    // Clear with a nice fade effect
    editorEl.style.opacity = '0.3';
    await sleep(600);
    editorEl.style.opacity = '1';

    projectIdx++;
  }
}

// Start
runLoop();
